<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>legend</title>
    <style>
        /*style the element with the class name "city"*/
        .city{
            background-color:tomato;
            color: white;
            padding: 10px;
        }
        /*style the element with the id "myheader"*/
        #myheader{
            background-color: lightblue;
            color: black;
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Difference between class and id</h2>
    <p>A class name can be used by multiple html elements while an id name must only be used by one
        HTML element within the page:
    </p>
    <!--An element with a unique id-->
    <div id="myheader"><h1>My Cities</h1></div>
    <!--Multiple elements with same class-->
    <div class="city">
    <h2>london</h2> 
    <p>London is the capital of England.</p>
    </div>
    <div class="city">
    <h2>paris</h2>
    <p>paris is the capital of france.</p>
    </div>
    <div class="city">
    <h2>Tokyo</h2>
    <p>tokyo is the capital of japan.</p>
    </div>   
</body>
</html>
