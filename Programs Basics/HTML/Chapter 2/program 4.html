<!DOCTYPE html>
<html>
<head>
    <title>legend</title>
</head>
<body>
<p style="border:1px solid black;">hello world</p>
<div style="border:1px solid yellow;">hello world</div>
<p>
    The P and the DIV elements are both blocks elements and they will always start on a new 
    line and take up the full width available (stretches out to the left and right as far as it can).
</p>    
</body>
</html>
