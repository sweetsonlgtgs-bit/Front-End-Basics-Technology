<!DOCTYPE html>
<html lang="en">
<head>
    <title>legend</title>
</head>
<body>
<h2>ordered list with lowercase letters</h2>
<ol type="a">
    <li>coffee</li>
    <li>tea</li>
    <li>milk</li>
</ol> 
<ol type="A">
    <li>coffee</li>
    <li>tea</li>
    <li>milk</li>
</ol>
<ol type="i">
    <li>coffee</li>
    <li>tea</li>
    <li>milk</li>
</ol>
<ol type="I">
    <li>coffee</li>
    <li>tea</li>
    <li>milk</li>
</ol>
<ol type="1">
    <li>coffee</li>
    <li>tea</li>
    <li>milk</li>
</ol> 
</body>
</html>
