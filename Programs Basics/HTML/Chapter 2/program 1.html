<!DOCTYPE html>
<html>
<style>
    table,th,td{
        border: 1px solid black;
    }
</style>
<body>
    <h2>TH elements define table headers</h2>
    <table style="width:20%">
        <tr>
            <th>person 1</th>
            <th>person 2</th>
            <th>person 3</th>
        </tr>
        <tr>
            <td>emil</td>
            <td>tobias</td>
            <td>linus</td>
        </tr>
        <tr>
            <td>16</td>
            <td>14</td>
            <td>10</td>
        </tr>
        <ul>
            <li>coffee</li>
            <li>tea</li>
            <li>milk</li>
        </ul>
        <ul style="list-style-type:square;">
        <li>coffee</li>
        <li>tea</li>
        <li>milk</li>
        </ul>
        <dl>
            <dt>coffee</dt>
            <dd>black leo rrr</dd>
            <dt>milk</dt>
            <dd>white cold drink</dd>
        </dl>
        <ol>
            <li>coffee</li>
            <li>tea</li>
            <li>milk</li>
        </ol>
    </table>
    <p>To undestand the better we have added borders to the table.</p>
</body>
</html>
