<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>legend</title>
</head>
<body>
    <h2>Javascript Arrays</h2>
    <p>Arrays indexes are zero-based which means the first item is [0].</p>
    <p id="demo"></p>
    <script>
        const cars=["saab","volvo","BMW"];
        document.getElementById("demo").innerHTML=cars[0];
    </script>
</body>
</html>
