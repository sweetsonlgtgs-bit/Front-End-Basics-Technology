<body>
    <h1>Javascript Operators</h1>
    <h2>The type of Operators</h2>
    <p>The type of Operators return the type of a variable or an expression.</p>
    <p id="demo"></p>
    <script>
        document.getElementById("demo").innerHTML=
        typeof ""+"<br>"+
        typeof "john"+"<br>"+
        typeof 1045
    </script>
