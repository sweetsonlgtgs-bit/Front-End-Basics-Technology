<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>legend</title>
</head>
<body>
    <h2>Javascript const</h2>
    <p>Declaring a constant array does not make the element unchangeable:</p>
    <p id="demo"></p>
    <script>
        //Create an Array:
        const cars=["saab","Volvo","BMW"];
        //Change an element:
        cars[0]="Toyota";
        //Add an element:
        cars.push("Audi");
        //Display the Array:
        document.getElementById("demo").innerHTML=cars;
    </script>
</body>
</html>
