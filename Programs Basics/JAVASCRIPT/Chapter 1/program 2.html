<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>legend</title>
</head>
<body>
    <h2>What can Javascript do?</h2>
    <p>Javascript can change HTML attribute values.</p>
    <p>In this case javascript changes the value of the src(source)attribute of an image.</p>
    <button onclick="document.getElementById('myimage').src='xps1.jpg'">Turn on the light</button>
    <img id="myimage" src="xps2.jpg" style="width: 100px;">
    <button onclick="document.getElementById('myimage').src='xps2.jpg'">Turn off the light</button>
</body>
</html>
