<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>legend</title>
</head>
<body>
    <h2>Javascript const</h2>
    <p>Declaring a constant array does not make the object property unchangeble:</p>
    <p id="demo"></p>
    <script>
        //create an array:
        const cars ={type:"fiat",model:"500",color:"white"};
        //change a property:
        cars.color="red";
        //Add a property:
        cars.owner="Johnson";
        //Display the property:
        document.getElementById("demo").innerHTML="Car owner is"+cars.owner;
    </script>
</body>
</html>
