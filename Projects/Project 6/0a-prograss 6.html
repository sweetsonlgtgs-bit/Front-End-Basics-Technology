<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Tasks Combines Access</title>
    <script>
        function bot0(){
            window.open("prograss 1.html")
        }
        function bot1(){
            window.open("prograss 2.html")
        }
        function bot2(){
            window.open("prograss 3.html")
        }
        function bot3(){
            window.open("1a-prograss 4.html")
        }
        function bot4(){
            window.open("1a-prograss 5.html")
        }
    </script>
    <style>
        body{
            background-image: url(alltt.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            width: 100%;
            height: 563px;
        }
        button{
            border: solid black 5px;
            border-radius: 10px;
            background-color: darkgrey;
            color: black;
            width: 15%;
            height: 50px;
            margin-left: 52px;
            margin-top: 400px;
        }
        h1{
            text-align: center;
            border: solid black 3px;
            border-radius: 10px;
            height: 40px;
            margin-bottom: 0%;
            background-color:brown;
        }
        button:hover{
            background-color: red;
        }
        .column.side {
            width: 25%;
            }
        /* Middle column */
        .column.middle {
            width: 50%;
            }
        @media screen and (max-width: 420px) {
            .column.side, .column.middle {
            width: 100%;
            }
        }
        @media screen and (min-width: 320px) {
            .column.side, .column.middle {
            width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Five Tasks Combines Access</h1>
    <p>
        <button onclick="bot0()"><b>Task 1</b></button>
        <button onclick="bot1()"><b>Task 2</b></button>
        <button onclick="bot2()"><b>Task 3</b></button>
        <button onclick="bot3()"><b>Task 4</b></button>
        <button onclick="bot4()"><b>Task 5</b></button>
    </p>
</body>
</html>
